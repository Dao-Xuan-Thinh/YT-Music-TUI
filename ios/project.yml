name: YTMusic
options:
  bundleIdPrefix: com.ytmtui
  deploymentTarget:
    iOS: "16.0"
    watchOS: "9.0"
  createIntermediateGroups: true

targets:
  YTMusic:
    type: application
    platform: iOS
    sources:
      - path: YTMusic
        excludes:
          - "**/*.py"
      # Bundled verbatim at the .app root (PYTHONHOME staging + our code + deps).
      - path: app
        type: folder
        buildPhase: resources
      - path: app_packages
        type: folder
        buildPhase: resources
    dependencies:
      - framework: Support/Python.xcframework
        embed: true
        codeSign: true
      # Stats widget rides inside the app bundle (PlugIns/YTMusicWidget.appex).
      - target: YTMusicWidget
        embed: true
      # Watch remote, embedded under Watch/ (xcodegen places watchapp2 there).
      # Requires BOTH the watchOS runtime (`xcodebuild -downloadPlatform
      # watchOS`) AND a signed-in Xcode account (the .watchkitapp App ID is
      # minted on demand) — without either, EVERY iOS build fails. See CLAUDE.md.
      - target: YTMusicWatch
        embed: true
    # App Group shared with the widget (stats.json lives there). xcodegen
    # regenerates the .entitlements plist from these properties at `generate`.
    entitlements:
      path: YTMusic/YTMusic.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.ytmtui.YTMusic
    info:
      path: YTMusic/Info.plist
      properties:
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        ITSAppUsesNonExemptEncryption: false
        CFBundleShortVersionString: "1.11"
        CFBundleVersion: "13"
        # Deep link used by the Now Playing widget's iOS-16 fallback.
        CFBundleURLTypes:
          - CFBundleURLName: com.ytmtui.YTMusic
            CFBundleURLSchemes:
              - ytmtui
        # audio: keep playing when locked/backgrounded. fetch: BGAppRefreshTask
        # (BackgroundRefresher — session keep-alive + stats sync).
        UIBackgroundModes:
          - audio
          - fetch
        BGTaskSchedulerPermittedIdentifiers:
          - com.ytmtui.YTMusic.refresh
    settings:
      base:
        SWIFT_OBJC_BRIDGING_HEADER: YTMusic/YTMusic-Bridging-Header.h
        # Swift 5 language mode: avoids strict-concurrency friction with AVPlayer /
        # MPRemoteCommandCenter callbacks for this spike.
        SWIFT_VERSION: "5.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.ytmtui.YTMusic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        # Allow loading the embedded Python dylib + .so-derived frameworks.
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: YES
        # Single-arch builds: install_python's `lib-$ARCHS` assumes one arch.
        ONLY_ACTIVE_ARCH: YES
        # Device signing (Phase 3): set DEVELOPMENT_TEAM via build flag or Xcode UI.
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
    postBuildScripts:
      - name: Install Python stdlib + extension frameworks
        basedOnDependencyAnalysis: false
        script: |
          set -e
          source "$PROJECT_DIR/Support/Python.xcframework/build/utils.sh"
          install_python Support/Python.xcframework app app_packages

  # watchOS remote: control what the phone is playing (no audio of its own,
  # no Python). Modern single-target watch app: type `application` (NOT
  # `application.watchapp2` — that legacy stub type COPIES its binary from
  # Apple's WatchKitStub via CopyAndPreserveArchs, which collides with the Ld
  # step once the app has its own @main Swift sources: "Multiple commands
  # produce …/YTMusicWatch"). `WKApplication: true` + the companion bundle id
  # below are what make this a paired watch app.
  YTMusicWatch:
    type: application
    platform: watchOS
    sources:
      - path: WatchApp
    info:
      path: WatchApp/Info.plist
      properties:
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.ytmtui.YTMusic
        CFBundleDisplayName: YT Music
        # MUST match the app (and widget) or the install is rejected.
        CFBundleShortVersionString: "1.11"
        CFBundleVersion: "13"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ytmtui.YTMusic.watchkitapp
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "4"
        ONLY_ACTIVE_ARCH: YES
        SKIP_INSTALL: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""

  # Listen-stats home-screen widget. Tiny on purpose: no bridging header, no
  # Python, no resources — just the widget UI + the shared StatsModel.swift,
  # reading stats.json from the App Group the app writes into.
  YTMusicWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: YTMusicWidget
      - path: YTMusic/StatsModel.swift
      - path: YTMusic/NowPlayingShared.swift
      # Type-only in the widget (perform() body is app-side, fenced behind
      # !WIDGET_EXTENSION) — needed for Button(intent:).
      - path: YTMusic/PlayIntent.swift
    entitlements:
      path: YTMusicWidget/YTMusicWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.ytmtui.YTMusic
    info:
      path: YTMusicWidget/Info.plist
      properties:
        CFBundleDisplayName: YT Music Stats
        # MUST match the app's versions or the install is rejected.
        CFBundleShortVersionString: "1.11"
        CFBundleVersion: "13"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ytmtui.YTMusic.Widget
        SWIFT_VERSION: "5.0"
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) WIDGET_EXTENSION"
        TARGETED_DEVICE_FAMILY: "1,2"
        ONLY_ACTIVE_ARCH: YES
        SKIP_INSTALL: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
