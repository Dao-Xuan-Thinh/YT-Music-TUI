name: YTMusic
options:
  bundleIdPrefix: com.ytmtui
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

targets:
  YTMusic:
    type: application
    platform: iOS
    sources:
      - path: YTMusic
        excludes:
          - "**/*.py"
      # Bundled verbatim at the .app root (PYTHONHOME staging + our code + deps).
      - path: app
        type: folder
        buildPhase: resources
      - path: app_packages
        type: folder
        buildPhase: resources
    dependencies:
      - framework: Support/Python.xcframework
        embed: true
        codeSign: true
      # Stats widget rides inside the app bundle (PlugIns/YTMusicWidget.appex).
      - target: YTMusicWidget
        embed: true
    # App Group shared with the widget (stats.json lives there). xcodegen
    # regenerates the .entitlements plist from these properties at `generate`.
    entitlements:
      path: YTMusic/YTMusic.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.ytmtui.YTMusic
    info:
      path: YTMusic/Info.plist
      properties:
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        ITSAppUsesNonExemptEncryption: false
        CFBundleShortVersionString: "1.8"
        CFBundleVersion: "10"
        # Keep audio playing when the screen is locked / app backgrounded.
        UIBackgroundModes:
          - audio
    settings:
      base:
        SWIFT_OBJC_BRIDGING_HEADER: YTMusic/YTMusic-Bridging-Header.h
        # Swift 5 language mode: avoids strict-concurrency friction with AVPlayer /
        # MPRemoteCommandCenter callbacks for this spike.
        SWIFT_VERSION: "5.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.ytmtui.YTMusic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        # Allow loading the embedded Python dylib + .so-derived frameworks.
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: YES
        # Single-arch builds: install_python's `lib-$ARCHS` assumes one arch.
        ONLY_ACTIVE_ARCH: YES
        # Device signing (Phase 3): set DEVELOPMENT_TEAM via build flag or Xcode UI.
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
    postBuildScripts:
      - name: Install Python stdlib + extension frameworks
        basedOnDependencyAnalysis: false
        script: |
          set -e
          source "$PROJECT_DIR/Support/Python.xcframework/build/utils.sh"
          install_python Support/Python.xcframework app app_packages

  # Listen-stats home-screen widget. Tiny on purpose: no bridging header, no
  # Python, no resources — just the widget UI + the shared StatsModel.swift,
  # reading stats.json from the App Group the app writes into.
  YTMusicWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: YTMusicWidget
      - path: YTMusic/StatsModel.swift
    entitlements:
      path: YTMusicWidget/YTMusicWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.ytmtui.YTMusic
    info:
      path: YTMusicWidget/Info.plist
      properties:
        CFBundleDisplayName: YT Music Stats
        # MUST match the app's versions or the install is rejected.
        CFBundleShortVersionString: "1.8"
        CFBundleVersion: "10"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ytmtui.YTMusic.Widget
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        ONLY_ACTIVE_ARCH: YES
        SKIP_INSTALL: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
